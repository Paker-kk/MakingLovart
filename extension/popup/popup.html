<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flovart Extension</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-root">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="6" fill="url(#g1)" />
          <path d="M7 12l3 3 7-7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="g1" x1="2" y1="2" x2="22" y2="22"><stop stop-color="#DC2626"/><stop offset="1" stop-color="#F43F5E"/></linearGradient></defs>
        </svg>
        <span class="popup-title">Flovart</span>
      </div>
      <span class="popup-version">v1.1</span>
    </div>

    <!-- Open Canvas CTA -->
    <button id="openCanvas" class="popup-cta">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="3" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <path d="M21 15l-5-5L5 21" />
      </svg>
      打开 AI 画布
    </button>

    <!-- Quick Actions -->
    <div class="popup-section">
      <div class="popup-section-title">快捷操作</div>
      <div class="popup-actions">
        <button id="captureTab" class="popup-action" title="截取当前页面作为参考">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
          <span>截取页面</span>
        </button>
        <button id="collectImages" class="popup-action" title="采集当前页面所有图片">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <span>采集灵感</span>
        </button>
      </div>
    </div>

    <!-- API Key Config -->
    <div class="popup-section">
      <div class="popup-section-title">API 配置</div>
      <div id="keyStatus" class="popup-key-status">
        <div class="popup-key-indicator" id="keyIndicator"></div>
        <span id="keyStatusText">检测中...</span>
      </div>
      <div id="quickKeySetup" class="popup-key-setup is-hidden">
        <select id="providerSelect" class="popup-select" title="选择 API 提供商" aria-label="选择 API 提供商">
          <option value="google">Google Gemini</option>
          <option value="openai">OpenAI</option>
          <option value="openrouter">OpenRouter</option>
          <option value="deepseek">DeepSeek</option>
          <option value="siliconflow">SiliconFlow</option>
          <option value="anthropic">Anthropic</option>
          <option value="minimax">MiniMax</option>
          <option value="volcengine">火山引擎</option>
          <option value="qwen">通义千问</option>
          <option value="custom">自定义兼容端点</option>
        </select>
        <div id="providerHint" class="popup-provider-hint">官方 Gemini Key，适合文本、图像、视频生成。</div>
        <div id="customBaseUrlWrap" class="popup-custom-base-url is-hidden">
          <input type="url" id="baseUrlInput" class="popup-input" placeholder="https://your-endpoint.com 或 https://your-endpoint.com/v1" />
          <div class="popup-inline-note">支持 OpenAI 兼容第三方、One-API、LiteLLM 等端点。只填域名时会自动尝试补齐 /v1。</div>
        </div>
        <div class="popup-key-input-row">
          <input type="password" id="apiKeyInput" class="popup-input" placeholder="粘贴 API Key..." />
          <button id="saveKeyBtn" class="popup-btn-save">保存</button>
        </div>
        <div id="keySaveStatus" class="popup-key-save-status"></div>
      </div>
      <button id="toggleKeySetup" class="popup-action popup-action-full">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span id="toggleKeyText">配置 API Key</span>
      </button>
    </div>

    <div class="popup-section">
      <div class="popup-section-title">联系与反馈</div>
      <div class="popup-links">
        <button id="openDemoLink" class="popup-link-card" title="打开在线 Demo">在线 Demo</button>
        <button id="openGithubLink" class="popup-link-card" title="打开 GitHub 仓库">GitHub</button>
        <button id="openIssuesLink" class="popup-link-card" title="打开 Issues 反馈问题">反馈 Issue</button>
      </div>
      <div class="popup-inline-note">产品更新看仓库，问题反馈和合作沟通先走 GitHub Issues。</div>
    </div>

    <!-- Status -->
    <div class="popup-footer">
      <div class="popup-status" id="statusDot"></div>
      <span id="statusText">右键任意图片可快速操作，第三方兼容入口已接入</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
